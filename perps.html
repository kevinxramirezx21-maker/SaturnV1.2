<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Saturn Perpetuals</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background:#050816;
  color:white;
  font-family:Inter,sans-serif;
}

.glass{
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
}

</style>

</head>
<body>

<div class="max-w-7xl mx-auto px-6 py-10">

  <div class="flex justify-between items-center mb-10">

    <div>
      <h1 class="text-5xl font-bold">
        Saturn Perpetuals
      </h1>

      <p class="text-white/50 mt-2">
        Demo Trading Environment
      </p>
    </div>

    <a
      href="index.html"
      class="px-5 py-3 rounded-2xl glass"
    >
      Back
    </a>

  </div>

  <div class="grid lg:grid-cols-3 gap-8">

    <!-- CHART -->
    <div class="lg:col-span-2 glass rounded-3xl p-6">

      <div class="mb-4 font-semibold">
        BTC/USDT
      </div>

      <div
        id="tradingview_chart"
        style="height:700px;"
      ></div>

    </div>

    <!-- TRADING PANEL -->
    <div class="glass rounded-3xl p-6">

      <div class="flex justify-between mb-6">

        <div>
          <div class="text-sm text-white/50">
            Demo Balance
          </div>

          <div
            id="balance"
            class="text-3xl font-bold"
          >
            $100,000
          </div>
        </div>

        <div class="text-right">
          <div class="text-sm text-white/50">
            Leverage
          </div>

          <div id="levDisplay" class="text-2xl font-bold">
            10x
          </div>
        </div>

      </div>

      <!-- LEVERAGE -->
      <div class="mb-6">

        <input
          type="range"
          min="1"
          max="250"
          value="10"
          id="leverage"
          class="w-full"
        />

      </div>

      <!-- ORDER SIZE -->
      <div class="mb-4">

        <div class="text-sm mb-2">
          Position Size (USDT)
        </div>

        <input
          id="size"
          type="number"
          value="1000"
          class="w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3"
        />

      </div>

      <!-- LONG SHORT -->
      <div class="grid grid-cols-2 gap-4">

        <button
          onclick="openTrade('LONG')"
          class="bg-green-500 py-4 rounded-2xl font-bold"
        >
          LONG
        </button>

        <button
          onclick="openTrade('SHORT')"
          class="bg-red-500 py-4 rounded-2xl font-bold"
        >
          SHORT
        </button>

      </div>

      <!-- POSITIONS -->
      <div class="mt-8">

        <div class="font-semibold mb-4">
          Open Positions
        </div>

        <div id="positions">

          <div class="text-white/40 text-sm">
            No positions open.
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

let balance = 100000;

let positions = [];

const leverage =
  document.getElementById("leverage");

const levDisplay =
  document.getElementById("levDisplay");

leverage.oninput = () => {

  levDisplay.innerText =
    leverage.value + "x";

};

function openTrade(side){

  const size =
    parseFloat(
      document.getElementById("size").value
    );

  const lev =
    parseInt(leverage.value);

  if(size > balance){

    alert("Insufficient balance");

    return;

  }

  const pnl =
    ((Math.random() * 20) - 10).toFixed(2);

  positions.push({
    side,
    size,
    lev,
    pnl
  });

  renderPositions();

}

function renderPositions(){

  const container =
    document.getElementById("positions");

  if(positions.length === 0){

    container.innerHTML =
      `<div class="text-white/40 text-sm">
        No positions open.
      </div>`;

    return;

  }

  container.innerHTML =
    positions.map((p,i)=>`

      <div class="bg-black/20 rounded-2xl p-4 mb-4">

        <div class="flex justify-between">

          <div>
            <div class="${
              p.side === "LONG"
                ? "text-green-400"
                : "text-red-400"
            } font-bold">

              ${p.side}

            </div>

            <div class="text-sm text-white/50 mt-1">
              ${p.lev}x leverage
            </div>
          </div>

          <div class="text-right">

            <div>
              $${p.size}
            </div>

            <div class="${
              p.pnl >= 0
                ? "text-green-400"
                : "text-red-400"
            }">

              ${p.pnl}%

            </div>

          </div>

        </div>

      </div>

    `).join("");

}

function loadTradingView(){

  const script =
    document.createElement("script");

  script.src =
    "https://s3.tradingview.com/tv.js";

  script.onload = () => {

    new TradingView.widget({

      width:"100%",
      height:700,
      symbol:"BINANCE:BTCUSDT",
      interval:"15",
      timezone:"Etc/UTC",
      theme:"dark",
      style:"1",
      locale:"en",
      toolbar_bg:"#0a0f1f",
      enable_publishing:false,
      allow_symbol_change:true,
      container_id:"tradingview_chart"

    });

  };

  document.body.appendChild(script);

}

loadTradingView();

</script>

</body>
</html>
