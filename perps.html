<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Saturn Perpetuals</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background:#050816;
  color:white;
  font-family:Inter,sans-serif;
}

.glass{
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
}

.saturn-logo{
  animation:spin 18s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

</style>

</head>
<body>

<div class="max-w-7xl mx-auto px-6 py-8">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">

<div class="flex items-center gap-4">

<div class="saturn-logo text-5xl">
🪐
</div>

<div>
<h1 class="text-5xl font-bold">
Saturn Perpetuals
</h1>

<p class="text-white/50 mt-1">
Advanced Demo Trading Environment
</p>
</div>

</div>

<a
href="index.html"
class="px-5 py-3 rounded-2xl glass"
>
Back
</a>

</div>

<div class="grid lg:grid-cols-3 gap-8">

<!-- CHART -->
<div class="lg:col-span-2 glass rounded-3xl p-6">

<div class="flex justify-between items-center mb-4">

<select
id="symbol"
class="bg-black/30 border border-white/10 rounded-xl px-4 py-2"
onchange="changeSymbol()"
>
<option value="btcusdt">BTCUSDT</option>
<option value="ethusdt">ETHUSDT</option>
<option value="solusdt">SOLUSDT</option>
<option value="xrpusdt">XRPUSDT</option>
<option value="dogeusdt">DOGEUSDT</option>
<option value="adausdt">ADAUSDT</option>
<option value="avaxusdt">AVAXUSDT</option>
<option value="linkusdt">LINKUSDT</option>
</select>

<div
id="markPrice"
class="text-2xl font-bold"
>
Loading...
</div>

</div>

<div
id="tradingview_chart"
style="height:700px;"
></div>

</div>

<!-- TRADING PANEL -->
<div class="glass rounded-3xl p-6">

<div class="flex justify-between mb-8">

<div>
<div class="text-sm text-white/50">
Demo Balance
</div>

<div
id="balance"
class="text-3xl font-bold"
>
$100000.00
</div>
</div>

<div class="text-right">
<div class="text-sm text-white/50">
Leverage
</div>

<div
id="levDisplay"
class="text-2xl font-bold"
>
10x
</div>
</div>

</div>

<!-- LEVERAGE -->
<div class="mb-6">

<input
type="range"
min="1"
max="250"
value="10"
id="leverage"
class="w-full"
/>

</div>

<!-- SIZE -->
<div class="mb-4">

<div class="text-sm mb-2">
Position Size (USDT)
</div>

<input
id="size"
type="number"
value="1000"
class="w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3"
/>

</div>

<!-- TAKE PROFIT -->
<div class="mb-4">

<div class="text-sm mb-2">
Take Profit %
</div>

<input
id="tp"
type="number"
value="15"
class="w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3"
/>

</div>

<!-- STOP LOSS -->
<div class="mb-6">

<div class="text-sm mb-2">
Stop Loss %
</div>

<input
id="sl"
type="number"
value="10"
class="w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3"
/>

</div>

<div class="grid grid-cols-2 gap-4">

<button
onclick="openTrade('LONG')"
class="bg-green-500 py-4 rounded-2xl font-bold"
>
LONG
</button>

<button
onclick="openTrade('SHORT')"
class="bg-red-500 py-4 rounded-2xl font-bold"
>
SHORT
</button>

</div>

<!-- POSITIONS -->
<div class="mt-10">

<div class="font-semibold mb-4">
Open Positions
</div>

<div id="positions">

<div class="text-white/40 text-sm">
No positions open.
</div>

</div>

</div>

</div>

</div>

</div>

<script>

let balance = 100000;

let currentPrice = 0;

let positions = [];

let currentSymbol = "btcusdt";

const leverageSlider =
document.getElementById("leverage");

const levDisplay =
document.getElementById("levDisplay");

leverageSlider.oninput = () => {
levDisplay.innerText =
leverageSlider.value + "x";
};

function updateBalance(){

document.getElementById("balance").innerText =
"$" + balance.toFixed(2);

}

async function fetchPrice(){

try{

const res =
await fetch(
`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol.toUpperCase()}`
);

const data =
await res.json();

currentPrice =
parseFloat(data.price);

document.getElementById("markPrice").innerText =
"$" + currentPrice.toLocaleString();

updatePositions();

}catch(err){

console.error(err);

}

}

function openTrade(side){

const size =
parseFloat(document.getElementById("size").value);

const lev =
parseInt(leverageSlider.value);

const tp =
parseFloat(document.getElementById("tp").value);

const sl =
parseFloat(document.getElementById("sl").value);

if(size > balance){

alert("Insufficient balance");

return;

}

const liquidation =
side === "LONG"
? currentPrice - (currentPrice / lev)
: currentPrice + (currentPrice / lev);

positions.push({

id:Date.now(),

side,

entry:currentPrice,

size,

lev,

tp,

sl,

liquidation,

pnl:0

});

renderPositions();

}

function updatePositions(){

positions.forEach(position=>{

let pnlPercent;

if(position.side === "LONG"){

pnlPercent =
((currentPrice - position.entry)
/
position.entry)
* 100
* position.lev;

}else{

pnlPercent =
((position.entry - currentPrice)
/
position.entry)
* 100
* position.lev;

}

position.pnl = pnlPercent;

if(position.pnl >= position.tp){

const gain =
position.size * (position.pnl / 100);

balance += gain;

closePosition(position.id);

}

if(position.pnl <= -position.sl){

const loss =
position.size * (Math.abs(position.pnl) / 100);

balance -= loss;

closePosition(position.id);

}

if(
(position.side === "LONG"
&& currentPrice <= position.liquidation)
||
(position.side === "SHORT"
&& currentPrice >= position.liquidation)
){

balance -= position.size;

closePosition(position.id);

alert("Position Liquidated");

}

});

renderPositions();

updateBalance();

}

function partialClose(id){

const position =
positions.find(p => p.id === id);

if(!position) return;

const partial =
position.size * 0.5;

const pnlValue =
partial * (position.pnl / 100);

balance += pnlValue;

position.size =
position.size * 0.5;

renderPositions();

updateBalance();

}

function closePosition(id){

positions =
positions.filter(
p => p.id !== id
);

renderPositions();

}

function manualClose(id){

const position =
positions.find(
p => p.id === id
);

if(!position) return;

const pnlValue =
position.size * (position.pnl / 100);

balance += pnlValue;

closePosition(id);

updateBalance();

}

function renderPositions(){

const container =
document.getElementById("positions");

if(positions.length === 0){

container.innerHTML =
`<div class="text-white/40 text-sm">
No positions open.
</div>`;

return;

}

container.innerHTML =
positions.map(p=>`

<div class="bg-black/20 rounded-2xl p-4 mb-4">

<div class="flex justify-between">

<div>

<div class="${
p.side === "LONG"
? "text-green-400"
: "text-red-400"
} font-bold">

${p.side}

</div>

<div class="text-sm text-white/50 mt-1">
${p.lev}x leverage
</div>

</div>

<div class="text-right">

<div>
$${p.size.toFixed(2)}
</div>

<div class="${
p.pnl >= 0
? "text-green-400"
: "text-red-400"
}">
${p.pnl.toFixed(2)}%
</div>

</div>

</div>

<div class="mt-3 text-sm text-white/50">
Entry:
$${p.entry.toFixed(2)}
</div>

<div class="text-sm text-white/50">
Liquidation:
$${p.liquidation.toFixed(2)}
</div>

<div class="flex gap-2 mt-4">

<button
onclick="partialClose(${p.id})"
class="flex-1 bg-yellow-500/20 hover:bg-yellow-500/30 py-2 rounded-xl"
>
Partial Close
</button>

<button
onclick="manualClose(${p.id})"
class="flex-1 bg-white/10 hover:bg-white/20 py-2 rounded-xl"
>
Close
</button>

</div>

</div>

`).join("");

}

function changeSymbol(){

currentSymbol =
document.getElementById("symbol").value;

const tvSymbol =
"BINANCE:" +
currentSymbol.toUpperCase();

document.getElementById(
"tradingview_chart"
).innerHTML = "";

new TradingView.widget({

width:"100%",

height:700,

symbol:tvSymbol,

interval:"15",

timezone:"Etc/UTC",

theme:"dark",

style:"1",

locale:"en",

toolbar_bg:"#0a0f1f",

enable_publishing:false,

allow_symbol_change:true,

container_id:"tradingview_chart"

});

fetchPrice();

}

function loadTradingView(){

const script =
document.createElement("script");

script.src =
"https://s3.tradingview.com/tv.js";

script.onload = () => {

changeSymbol();

};

document.body.appendChild(script);

}

setInterval(fetchPrice,2000);

loadTradingView();

updateBalance();

</script>

</body>
</html>
