<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saturn • Token Locker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://terminal.jup.ag/main-v3.js" data-preload></script>
  <!-- Solana Web3.js -->
  <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
</head>
<body class="bg-[#03050c] text-white">

  <!-- Back Button -->
  <div class="px-6 py-4 border-b border-white/10 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-x-2 text-sm hover:text-violet-400 font-medium">
      <i class="fa-solid fa-arrow-left"></i> ← Back to Saturn Hub
    </a>
    <div id="walletStatus" class="text-xs"></div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-10">
    <h1 class="text-4xl font-bold">Token Locker</h1>
    <p class="text-white/70">Phantom + Jupiter Swap + <span class="text-emerald-400">On-Chain Vesting</span></p>

    <!-- Wallet -->
    <div class="mt-6">
      <button onclick="connectPhantom()" class="px-6 py-3 bg-white text-black rounded-3xl font-semibold flex items-center gap-x-2">
        <i class="fa-solid fa-wallet"></i> <span id="connectBtn">Connect Phantom</span>
      </button>
      <span id="walletAddress" class="ml-4 text-emerald-400 font-mono text-sm hidden"></span>
    </div>

    <!-- Jupiter Terminal -->
    <div class="mt-10">
      <h3 class="text-xl font-semibold mb-3">Jupiter Swap</h3>
      <div id="jupiter-terminal" class="glass rounded-3xl p-4"></div>
    </div>

    <!-- On-Chain Vesting Lock -->
    <div class="max-w-2xl mt-12 p-8 glass rounded-3xl border border-white/10">
      <h3 class="text-2xl font-semibold mb-2">Create On-Chain Vesting Lock</h3>
      <p class="text-sm text-white/60 mb-6">Sends tokens on-chain to a lock address + records it.</p>

      <div class="space-y-4">
        <div>
          <label class="text-sm">Token Mint Address</label>
          <input id="lockMint" class="w-full bg-white/5 border border-white/20 rounded-2xl px-4 py-3 text-sm" placeholder="Token mint...">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm">Amount</label>
            <input id="lockAmount" type="number" class="w-full bg-white/5 border border-white/20 rounded-2xl px-4 py-3 text-sm">
          </div>
          <div>
            <label class="text-sm">Lock Duration (days)</label>
            <input id="lockDays" type="number" value="30" class="w-full bg-white/5 border border-white/20 rounded-2xl px-4 py-3 text-sm">
          </div>
        </div>
        <div>
          <label class="text-sm">Lock Recipient Address (where tokens will be sent)</label>
          <input id="lockRecipient" class="w-full bg-white/5 border border-white/20 rounded-2xl px-4 py-3 text-sm" 
                 value="F36PUYop1oCsBQMyP8aHncGppiGd1xyUm8k75PtHAoN3" placeholder="Lock wallet address">
        </div>
      </div>

      <button onclick="createOnChainVestingLock()" 
              class="mt-8 w-full py-4 bg-gradient-to-r from-violet-600 to-fuchsia-600 rounded-3xl font-semibold">
        Create On-Chain Lock
      </button>

      <div id="vestingResult" class="mt-4 p-4 rounded-2xl bg-white/5 text-sm hidden"></div>

      <div class="mt-8">
        <div class="font-medium mb-3">My On-Chain Locks</div>
        <div id="myLocks" class="text-sm text-white/70">No locks yet.</div>
      </div>
    </div>
  </div>

  <script>
    let connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
    let walletPublicKey = null;

    // Phantom Connect
    async function connectPhantom() {
      if (!window.solana || !window.solana.isPhantom) {
        alert("Phantom not found. Please install it.");
        return;
      }
      try {
        const resp = await window.solana.connect();
        walletPublicKey = resp.publicKey;
        document.getElementById('connectBtn').textContent = "Connected";
        document.getElementById('walletAddress').textContent = walletPublicKey.toString().slice(0,4) + "..." + walletPublicKey.toString().slice(-4);
        document.getElementById('walletAddress').classList.remove('hidden');
      } catch (e) {
        alert("Connection failed");
      }
    }

    // Jupiter
    function initJupiter() {
      if (window.Jupiter) {
        window.Jupiter.init({
          displayMode: "integrated",
          integratedTargetId: "jupiter-terminal",
          endpoint: "https://api.mainnet-beta.solana.com"
        });
      }
    }

    // ==================== ON-CHAIN VESTING LOGIC ====================
    async function createOnChainVestingLock() {
      const mint = document.getElementById('lockMint').value.trim();
      const amount = parseFloat(document.getElementById('lockAmount').value);
      const days = parseInt(document.getElementById('lockDays').value) || 30;
      const recipient = document.getElementById('lockRecipient').value.trim();

      if (!mint || !amount || !recipient) {
        alert("Please fill Mint, Amount and Recipient");
        return;
      }
      if (!walletPublicKey) {
        alert("Please connect Phantom wallet first");
        return;
      }

      const resultDiv = document.getElementById('vestingResult');
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = "Creating on-chain lock transaction...";

      try {
        const mintPubkey = new solanaWeb3.PublicKey(mint);
        const recipientPubkey = new solanaWeb3.PublicKey(recipient);
        const amountLamports = Math.floor(amount * Math.pow(10, 6)); // assume 6 decimals (change if needed)

        // Get token account for sender
        const senderATA = await solanaWeb3.PublicKey.findProgramAddressSync(
          [walletPublicKey.toBuffer(), solanaWeb3.TOKEN_PROGRAM_ID.toBuffer(), mintPubkey.toBuffer()],
          solanaWeb3.SPL_ASSOCIATED_TOKEN_ACCOUNT_PROGRAM_ID
        )[0];

        // Get or create recipient ATA
        const recipientATA = await solanaWeb3.PublicKey.findProgramAddressSync(
          [recipientPubkey.toBuffer(), solanaWeb3.TOKEN_PROGRAM_ID.toBuffer(), mintPubkey.toBuffer()],
          solanaWeb3.SPL_ASSOCIATED_TOKEN_ACCOUNT_PROGRAM_ID
        )[0];

        const transaction = new solanaWeb3.Transaction();

        // Transfer instruction
        const transferInstruction = solanaWeb3.Token.createTransferInstruction(
          solanaWeb3.TOKEN_PROGRAM_ID,
          senderATA,
          recipientATA,
          walletPublicKey,
          [],
          amountLamports
        );
        transaction.add(transferInstruction);

        // Send transaction
        const signature = await window.solana.signAndSendTransaction(transaction);
        await connection.confirmTransaction(signature.signature, "confirmed");

        // Save locally
        const newLock = {
          mint,
          amount,
          days,
          recipient,
          tx: signature.signature,
          created: new Date().toISOString(),
          status: "On-Chain Locked"
        };

        let locks = JSON.parse(localStorage.getItem("saturn_locks") || "[]");
        locks.unshift(newLock);
        localStorage.setItem("saturn_locks", JSON.stringify(locks));

        resultDiv.innerHTML = `
          ✅ <strong>On-Chain Lock Created!</strong><br>
          Tx: <a href="https://solscan.io/tx/${signature.signature}" target="_blank" class="text-violet-400">${signature.signature.slice(0,12)}...</a><br>
          Tokens sent to lock address on-chain.
        `;
        renderMyLocks();

      } catch (err) {
        console.error(err);
        resultDiv.innerHTML = `❌ Error: ${err.message || "Transaction failed"}`;
      }
    }

    function renderMyLocks() {
      const container = document.getElementById('myLocks');
      const locks = JSON.parse(localStorage.getItem("saturn_locks") || "[]");
      if (!locks.length) {
        container.innerHTML = "No locks yet.";
        return;
      }
      container.innerHTML = locks.map(l => `
        <div class="py-2 border-b border-white/10 text-sm">
          ${l.mint.slice(0,6)}... • ${l.amount} tokens • ${l.days} days<br>
          <span class="text-emerald-400">${l.status}</span> 
          ${l.tx ? `<a href="https://solscan.io/tx/${l.tx}" target="_blank" class="text-xs text-violet-400">View Tx</a>` : ''}
        </div>
      `).join('');
    }

    // Init
    window.onload = () => {
      initJupiter();
      setTimeout(renderMyLocks, 600);
    };
  </script>
</body>
</html>
