<!DOCTYPE html>
<html lang="en">
<head><script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saturn Markets</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #050816;
      color: white;
      font-family: Arial, sans-serif;
    }

    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .market-row:hover {
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>

<body>

<div class="max-w-7xl mx-auto px-6 py-10">

  <div class="flex justify-between items-center mb-10">
    <div>
      <h1 class="text-5xl font-bold">Saturn Markets</h1>
      <p class="text-white/60 mt-2">
        Institutional-grade crypto intelligence
      </p>
    </div>

    <a
      href="index.html"
      class="px-5 py-3 rounded-2xl glass"
    >
      Back
    </a>
  </div>

  <!-- MARKET TABLE -->
  <div class="glass rounded-3xl overflow-hidden">

    <div class="grid grid-cols-6 gap-4 px-6 py-4 border-b border-white/10 text-white/50 text-sm">
      <div>#</div>
      <div>Asset</div>
      <div>Price</div>
      <div>24H</div>
      <div>Market Cap</div>
      <div>Volume</div>
    </div>

    <div id="marketTable"></div>

  </div>

  <!-- TRADINGVIEW -->
  <div class="mt-10 glass rounded-3xl p-6">

    <h2 class="text-2xl font-bold mb-5">
      TradingView Terminal
    </h2>

    <div class="tradingview-widget-container">
      <div id="tradingview_chart"></div>

      <script
        type="text/javascript"
        src="https://s3.tradingview.com/tv.js">
      </script>

      <script type="text/javascript">
        new TradingView.widget({
          width: "100%",
          height: 700,
          symbol: "BINANCE:BTCUSDT",
          interval: "15",
          timezone: "Etc/UTC",
          theme: "dark",
          style: "1",
          locale: "en",
          toolbar_bg: "#0a0f1f",
          enable_publishing: false,
          allow_symbol_change: true,
          container_id: "tradingview_chart"
        });
      </script>
    </div>

  </div>

</div>

<script type="module">

async function loadMarkets() {

  const url =
    "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=150&page=1&sparkline=false";

  const res = await fetch(url);

  const data = await res.json();

  const table =
    document.getElementById("marketTable");

  table.innerHTML = data.map((coin, index) => `

    <div class="grid grid-cols-6 gap-4 px-6 py-5 border-b border-white/5 market-row">

      <div class="text-white/50">
        ${index + 1}
      </div>

      <div class="flex items-center gap-3">
        <img
          src="${coin.image}"
          class="w-7 h-7 rounded-full"
        />

        <div>
          <div class="font-semibold">
            ${coin.symbol.toUpperCase()}
          </div>

          <div class="text-sm text-white/50">
            ${coin.name}
          </div>
        </div>
      </div>

      <div>
        $${coin.current_price.toLocaleString()}
      </div>

      <div class="${
        coin.price_change_percentage_24h >= 0
          ? "text-green-400"
          : "text-red-400"
      }">

        ${coin.price_change_percentage_24h.toFixed(2)}%

      </div>

      <div>
        $${coin.market_cap.toLocaleString()}
      </div>

      <div>
        $${coin.total_volume.toLocaleString()}
      </div>

    </div>

  `).join("");

}

loadMarkets();

</script>

</body>
</html>
